<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago exitoso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0fdf4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:14px;padding:40px 32px;max-width:440px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:24px;font-weight:800;color:#166534;margin-bottom:8px}
p{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:20px}
.codigo-box{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:10px;padding:20px;margin-bottom:20px}
.codigo-label{font-size:12px;font-weight:600;color:#166534;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.codigo{font-size:28px;font-weight:800;color:#166534;letter-spacing:3px}
.btn-copy{background:none;border:1.5px solid #16a34a;color:#16a34a;padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;margin-top:10px;font-family:inherit;font-weight:600}
.btn{display:block;background:#E8500A;color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;width:100%;margin-top:8px}
.info{background:#f9fafb;border-radius:8px;padding:14px;font-size:13px;color:#374151;text-align:left;margin-bottom:16px;line-height:1.7}
.info strong{color:#111}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>¡Pago aprobado!</h1>
  <p>Tu envío fue confirmado. Guardá el código de seguimiento para rastrear tu paquete.</p>

  <div class="codigo-box">
    <div class="codigo-label">Tu código de seguimiento</div>
    <div class="codigo" id="codigo">—</div>
    <button class="btn-copy" onclick="copiar()">Copiar código</button>
  </div>

  <div class="info" id="info-envio">Cargando datos del envío...</div>

  <button class="btn" onclick="rastrear()">Rastrear mi envío</button>
</div>

<script>
  var params  = new URLSearchParams(window.location.search);
  var numero  = params.get('numero');
  var envioId = params.get('envio');

  if (numero) document.getElementById('codigo').textContent = numero;

  // Confirmar pago y cargar datos
  async function init() {
    if (numero) {
      // Confirmar el pago en el backend
      await fetch('/api/pagos/confirmar/' + numero).catch(() => {});
    }

    if (envioId) {
      try {
        var r = await fetch('/api/pagos/detalle/' + envioId);
        var d = await r.json();
        if (d.origen) {
          document.getElementById('info-envio').innerHTML =
            '<strong>Origen:</strong> ' + d.origen + '<br>' +
            '<strong>Destino:</strong> ' + d.destino + '<br>' +
            '<strong>Servicio:</strong> ' + (d.tipo_servicio || '—') + '<br>' +
            '<strong>Estado:</strong> Confirmado ✓';
        }
      } catch(e) {
        document.getElementById('info-envio').textContent = 'Envío confirmado y en proceso.';
      }
    }
  }

  init();

  function copiar() {
    navigator.clipboard && navigator.clipboard.writeText(numero)
      .then(() => alert('Código copiado: ' + numero));
  }

  function rastrear() {
    // Guardar número para el tracking
    sessionStorage.setItem('tracking_numero', numero);
    window.location = '/demo.html';
  }
</script>
</body>
</html>
