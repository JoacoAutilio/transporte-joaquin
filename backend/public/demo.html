<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demo Cotizador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f9}
.navbar{background:#0B1E3D;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-size:20px;font-weight:800}
.logo em{color:#E8500A;font-style:normal}
.navbar nav a{color:rgba(255,255,255,.7);text-decoration:none;margin-left:24px;font-size:14px}
.hero{background:linear-gradient(135deg,#0B1E3D 60%,#132A52);color:#fff;padding:60px 32px;text-align:center}
.hero h1{font-size:42px;font-weight:800;margin-bottom:12px}
.hero h1 span{color:#FF6B2B}
.hero p{color:rgba(255,255,255,.65);font-size:17px}
.section{max-width:620px;margin:48px auto;padding:0 20px}
.section h2{font-size:26px;font-weight:800;color:#0B1E3D;margin-bottom:8px}
.section p{color:#6b7280;margin-bottom:24px}
.footer{background:#0B1E3D;color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:13px;margin-top:60px}
</style>
</head>
<body>
<div class="navbar">
  <div class="logo">Transporte <em>Joaquín</em></div>
  <nav><a href="#">Inicio</a><a href="#">Servicios</a><a href="#">Contacto</a></nav>
</div>
<div class="hero">
  <h1>Cargas a todo el país <span>rápido y seguro</span></h1>
  <p>Más de 25 años conectando empresas en Argentina</p>
</div>
<div class="section">
  <h2>Cotizá tu envío</h2>
  <p>Precio estimado al instante, sin compromiso.</p>
  <div id="cotizador-widget"></div>
  <script src="/widget.js" data-empresa="demo" data-container="cotizador-widget"></script>
</div>
<div class="footer">© 2025 Transporte Joaquín</div>
</body>
</html>
